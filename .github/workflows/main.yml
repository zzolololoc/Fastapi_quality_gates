name: Python Quality Gates

on: [push, pull_request]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё необходимое для линтеров и самого приложения
          pip install isort black flake8 mypy pytest flask-sqlalchemy flask factory-boy

      - name: Run isort check
        run: isort . --check-only

      - name: Run black check
        run: black . --check

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy .

      - name: Run pytest
        run: pytest